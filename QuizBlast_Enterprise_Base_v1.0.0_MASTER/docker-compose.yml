services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: quizblast
      POSTGRES_USER: quizblast
      POSTGRES_PASSWORD: quizblast
    ports:
      - "5432:5432"
    volumes:
      - quizblast_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://quizblast:quizblast@postgres:5432/quizblast
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-http://.*:5173}
    ports:
      - "8001:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  quizblast_postgres_data:
